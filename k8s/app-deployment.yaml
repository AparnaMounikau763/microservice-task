apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: task-manager

    spec:
      containers:
      - name: app

        image: aparnamounika/task-manager:1850105fd035ff05575a23664b6d783a8077e9e5
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_URL
          value: mongodb://mongo:27017/tasks

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /tasks
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /tasks
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20