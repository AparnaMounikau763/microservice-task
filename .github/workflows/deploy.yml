name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USER }}/task-manager:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USER }}/task-manager:${{ github.sha }}

    - name: Update Kubernetes YAML
      run: |
        sed -i 's|image:.*|image: ${{ secrets.DOCKER_USER }}/task-manager:${{ github.sha }}|g' k8s/app-deployment.yaml

    - name: Commit Updated YAML
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"

        git add k8s/app-deployment.yaml

        git commit -m "Updated image tag" || echo "No changes"

        git push
